name: Build and Package

permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download ffmpeg for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp" -Force
          $exe = Get-ChildItem -Path "ffmpeg_temp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "bin/ffmpeg.exe" -Force
      - name: Build with PyInstaller
        run: pyinstaller --noconsole --onefile --windowed --name "Conversor_Multimedia_Pro" --icon="app.ico" --add-binary "bin\ffmpeg.exe;." main.py
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Compile Inno Setup installer
        run: iscc instalador_inno_setup.iss
      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: Conversor_Multimedia_Pro-Windows
          path: dist/Conversor_Multimedia_Pro.exe
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Instalador_Windows
          path: dist/Instalador_Conversor_Multimedia_Pro.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download ffmpeg for macOS
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/get/zip"
          unzip -o ffmpeg.zip -d bin/
          chmod +x bin/ffmpeg
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --windowed --name "Oli Converter" --add-binary "bin/ffmpeg:." main.py
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Oli-Converter-macOS
          path: dist/Oli Converter.app

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Instalador_Windows
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: Conversor_Multimedia_Pro-Windows
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: Oli-Converter-macOS
          path: release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
